<h1 mat-dialog-title>Agregar nuevo</h1>
<form [formGroup]="formGroup" (submit)="guardar()">
  <mat-dialog-content>
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" placeholder="Básico" />
    </mat-form-field>

    <br />
    <mat-form-field appearance="outline">
      <input
        matInput
        [matDatepicker]="picker"
        formControlName="fechaInicial"
        placeholder="fecha inicial"
      />
      <mat-hint>MM/DD/YYYY</mat-hint>
      <mat-datepicker-toggle
        matIconSuffix
        [for]="picker"
      ></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <br />
    <mat-form-field appearance="outline">
      <input
        matInput
        [matDatepicker]="picker1"
        formControlName="fechaFinal"
        placeholder="fecha final"
      />
      <mat-hint>MM/DD/YYYY</mat-hint>
      <mat-datepicker-toggle
        matIconSuffix
        [for]="picker1"
      ></mat-datepicker-toggle>
      <mat-datepicker #picker1></mat-datepicker>
    </mat-form-field>

    <br />
  </mat-dialog-content>

  <mat-dialog-actions>
    @if(estaCargando){
    <button
      mat-fab
      extended
      color="primary"
      type="submit"
      [disabled]="estaCargando"
    >
      Un momento ...
      <mat-spinner [diameter]="20"></mat-spinner>
    </button>
    }@else {
    <button mat-fab extended color="primary" type="submit">
      <mat-icon>save</mat-icon> Guardar
    </button>
    }
  </mat-dialog-actions>
</form>
